<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Digit Recognizer</title>
    <meta name="description" content="Draw a digit and watch a CNN classify it in real-time with probability visualization.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>MNIST <span class="accent">Recognizer</span></h1>
            <p class="subtitle">Draw a digit — the CNN predicts in real-time</p>
        </header>

        <!-- Main Content -->
        <main class="main-grid">
            <!-- Canvas Section -->
            <section class="canvas-section" id="canvas-section">
                <div class="section-header">
                    <h2>Draw Here</h2>
                    <div class="canvas-controls">
                        <button class="btn" id="undo-btn" title="Undo last stroke">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                            </svg>
                            Undo
                        </button>
                        <button class="btn" id="clear-btn" title="Clear canvas">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18"></path>
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                            </svg>
                            Clear
                        </button>
                    </div>
                </div>
                <div class="canvas-wrapper">
                    <canvas id="draw-canvas" width="400" height="400"></canvas>
                    <div class="canvas-hint" id="canvas-hint">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                            <path d="M2 2l7.586 7.586"></path>
                        </svg>
                        <span>Draw a digit (0–9)</span>
                    </div>
                </div>
                <!-- Brush size slider -->
                <div class="brush-control">
                    <label for="brush-size">Brush</label>
                    <input type="range" id="brush-size" min="8" max="32" value="18">
                    <span class="brush-size-value" id="brush-size-value">18px</span>
                </div>
            </section>

            <!-- Prediction Section -->
            <section class="prediction-section" id="prediction-section">
                <!-- Big Prediction Display -->
                <div class="prediction-card">
                    <div class="prediction-label">Prediction</div>
                    <div class="prediction-digit" id="prediction-digit">?</div>
                    <div class="prediction-confidence" id="prediction-confidence">
                        Draw a digit to start
                    </div>
                </div>

                <!-- Probability Bars -->
                <div class="probability-container">
                    <h2>Probabilities</h2>
                    <div class="probability-bars" id="probability-bars">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>CNN trained on MNIST dataset · PyTorch + Flask</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
